<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AoE4 AI 自动对战模拟器</title>
  <meta name="description" content="Age of Empires 4 lightweight AI auto-battle simulator - MVP">
  <link rel="stylesheet" href="styles.css">
  <!-- 引入 PixiJS v7 渲染引擎 -->
  <script src="https://pixijs.download/v7.3.2/pixi.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 标题 -->
    <header id="header">
      <h1>⚔️ AoE4 AI 自动对战模拟器 <span class="version">MVP v0.1</span></h1>
      <p id="status-text">准备就绪</p>
    </header>

    <!-- 控制面板 -->
    <div id="controls">
      <!-- 红方配置 -->
      <div class="army-config team-red">
        <h3>🔴 红方 (Team A)</h3>
        <div class="micro-badge no-micro" style="margin-bottom: 10px;">🖐️ 手动指挥模式</div>
        <div style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px;">
          <button class="control-btn" onclick="window.engine && window.engine.queueManualTask(0, 'Knight')">骑士 (100肉 20金)</button>
          <button class="control-btn" onclick="window.engine && window.engine.queueManualTask(0, 'Horseman')">肉马 (100肉 20木)</button>
          <button class="control-btn" onclick="window.engine && window.engine.queueManualTask(0, 'Spearman')">枪兵 (60肉 20木)</button>
          <button class="control-btn" onclick="window.engine && window.engine.queueManualTask(0, 'MenAtArms')">武士 (100肉 20金)</button>
          <button class="control-btn" onclick="window.engine && window.engine.queueManualTask(0, 'Archer')">弓兵 (30肉 50木)</button>
          <button class="control-btn" onclick="window.engine && window.engine.queueManualTask(0, 'Crossbowman')">弩手 (80肉 40金)</button>
        </div>
        <div style="display: flex; gap: 5px; margin-bottom: 15px;">
          <button class="control-btn" style="flex:1; background:#b45309;" onclick="window.engine && window.engine.queueManualTask(0, 'House')">🏠 房屋 (50木)</button>
          <button class="control-btn" style="flex:1; background:#166534;" onclick="window.engine && window.engine.queueManualTask(0, 'Farm')">🌾 农田 (75木)</button>
        </div>
        <div style="border-top: 1px solid #333; padding-top: 10px;">
          <label style="font-size: 13px;">生产队列 (<span id="queue-length">0</span>)</label>
          <div id="manual-queue-display" style="display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; min-height: 24px; padding: 4px; background: rgba(0,0,0,0.2); border-radius: 4px;">
            <!-- Icons will map here -->
          </div>
        </div>
      </div>

      <!-- 中央按钮 -->
      <div class="action-buttons">
        <button id="btn-start" onclick="startBattle()">🗡 开战</button>
        <button id="btn-pause" onclick="togglePause()">⏸ 暂停</button>
        <div class="speed-controls">
          <span>速度:</span>
          <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
          <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
          <button class="speed-btn" onclick="setSpeed(2)">2x</button>
          <button class="speed-btn" onclick="setSpeed(4)">4x</button>
        </div>
      </div>

      <!-- 蓝方配置 -->
      <div class="army-config team-blue">
        <h3>🔵 蓝方 (Team B)</h3>
        <div class="micro-badge has-micro">✨ MicroAI 已启用</div>
        <div class="config-row">
          <label>骑士 (Knight)</label>
          <input type="number" id="b-knights" value="5" min="0" max="50">
        </div>
        <div class="config-row">
          <label>肉马 (Horseman)</label>
          <input type="number" id="b-horsemen" value="0" min="0" max="50">
        </div>
        <div class="config-row">
          <label>枪兵 (Spearman)</label>
          <input type="number" id="b-spearmen" value="5" min="0" max="50">
        </div>
        <div class="config-row">
          <label>武士 (Men-at-Arms)</label>
          <input type="number" id="b-menAtArms" value="0" min="0" max="50">
        </div>
        <div class="config-row">
          <label>弓兵 (Archer)</label>
          <input type="number" id="b-archers" value="5" min="0" max="50">
        </div>
        <div class="config-row">
          <label>弩手 (Crossbow)</label>
          <input type="number" id="b-crossbows" value="0" min="0" max="50">
        </div>
      </div>
    </div>

    <!-- 战场画布 -->
    <div id="canvas-wrapper">
      <canvas id="battlefield" width="1200" height="700"></canvas>
    </div>

    <!-- 克制关系提示 -->
    <div id="counter-info">
      <span class="counter-item">🐴 骑士 → 克制弓兵</span>
      <span class="counter-sep">|</span>
      <span class="counter-item">🗡 枪兵 → 死克骑兵</span>
      <span class="counter-sep">|</span>
      <span class="counter-item">🏹 弓兵 → 风筝枪兵</span>
    </div>

    <!-- 战斗日志 -->
    <div id="log-section">
      <h3>📜 战斗日志</h3>
      <div id="log-panel"></div>
    </div>
  </div>

  <script type="module" src="src/main.js?v=4"></script>
</body>
</html>
